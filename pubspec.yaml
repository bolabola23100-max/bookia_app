name: bookia
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.3
  gap: ^3.0.1
  pinput: ^6.0.2
  dio: ^5.9.2
  lottie: ^3.3.2
  go_router: ^17.1.0
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.5.4
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Images/
    - assets/svg/

fonts:
  - family: DMSerif
    fonts:
      - assets: assets/fonts/DMSerifDisplay-Regular.ttf
